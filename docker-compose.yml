services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowboard}
      POSTGRES_USER: ${POSTGRES_USER:-flowboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    expose:
      - "${POSTGRES_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowboard} -d ${POSTGRES_DB:-flowboard} -h 127.0.0.1 -p ${POSTGRES_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-proxy:
    image: alpine/socat:latest
    command: TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:55433:5432"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-flowboard}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me_strong_password}
    expose:
      - "${RABBITMQ_PORT:-5672}"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_INTERNAL_PORT:-8000}"]
    expose:
      - "${BACKEND_INTERNAL_PORT:-8000}"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.environ.get('BACKEND_INTERNAL_PORT','8000'))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads
    command: ["sh", "-c", "python -m app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m app.core.health worker"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
    env_file:
      - .env
    expose:
      - "${FRONTEND_INTERNAL_PORT:-3000}"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${FRONTEND_INTERNAL_PORT:-3000}/health || true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  uploads-data:
