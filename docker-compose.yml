services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p ${POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    expose:
      - "${RABBITMQ_PORT}"
      - "${RABBITMQ_MANAGEMENT_PORT}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_INTERNAL_PORT}"]
    expose:
      - "${BACKEND_INTERNAL_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.environ.get('BACKEND_INTERNAL_PORT','8000'))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["sh", "-c", "python -m app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m app.core.health worker"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    env_file:
      - .env
    expose:
      - "${FRONTEND_INTERNAL_PORT}"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${FRONTEND_INTERNAL_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

services:
  postgres-proxy:
    image: alpine/socat:latest
    command: TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:55433:5432"
    restart: unless-stopped